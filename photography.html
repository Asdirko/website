<style>
  .photogrid {
  grid-auto-flow: row dense;
  display: grid;
  row-gap: 10px; 
  margin-right: 10px;
  grid-template-columns: 230px;
  
  float: left;
}
.photogridleft {
  grid-auto-flow: row dense;
  display: grid;
  margin-left: 0px;
  row-gap: 10px;  
  grid-template-columns: 230px;
  
  float: right;
}
.photogrid > div {
  background-color: transparent;
  height: auto;
  transition-duration: .2s;
}
.photogrid > div:hover {
  transform: scale(1.25, 1.25);
  transform-origin: center;
  
}
.photogrid > div:hover p {
  transform: scale(0.8, 0.8);
  transform-origin: center;
}
.photogridleft > div {
  background-color: transparent;
  height: auto;
  transition-duration: .2s;
}
.photogridleft > div:hover {
  transform: scale(1.25, 1.25);
  transform-origin: center;
}
.photogridleft > div:hover p {
  transform: scale(0.8, 0.8);
  transform-origin: center;
}
  #maincontent {
    width: calc(100%);
    max-width: 750px;
    margin: 0px;
    background-color: #faebcc;
    padding: 10px;
    border-style: inset;
    border-width: 2px;
    border-color: #dbc7a6;
    margin-right: 5px;
  }
  #sidebar {
    width: 240px;
    margin: 0px;
    background-color: #faebcc;
    padding: 10px;
    border-style: inset;
    border-width: 2px;
    border-color: #dbc7a6;
    }
  
  #scrollbox {
    max-height: 200px;
    overflow-y: scroll;
    scrollbar-color: #faebcc;
    background-color: #dbc7a6;
    border-style: inset;
    border-width: 2px;
    border-color: #faebcc;
    padding: 5px;
  }
  #scrollbox p{
    font-size: 12px;
    font-family: AG, serif;
  }
  #buttonflexwrapper {
    display: flex;
    flex-wrap: wrap;
    flex-direction: row;
    margin-top: 10px;
  }
  #buttondisplay {
    width: calc((100% / 3) - 5px);
    margin: 2.5px;
  }
  #buttondisplay img{
    object-fit: cover;
    width: 100%;
    margin: 0px;
  }
  #graphicdisplay img{
    object-fit: cover;
    width: 240px;
    height: auto;
    margin: 0px;
    margin-bottom: -10px;
    border-radius: 5px;
    margin-top: 10px;
  }
  #indexfooter {
    max-width: 750px;
    background-color: #faebcc;
    padding: 10px;
    border-style: groove;
    border-width: 2px;
    border-color: #dbc7a6;
    padding: 0px;
  }

  #indexfooter p{
    font-size: 12px;
    font-family: AG, serif;
    margin-left: 5px;
  }
  li{
    font-family: AG;
    font-size: 15px;
    margin-left: 10px;
  }
  a {
    color: black;
    text-decoration: none;
  }         /* Unvisited link  */
  a:visited {
    color: black;
    text-decoration: none;
  } /* Visited link    */
  a:hover {
    color:#2596be;
    text-decoration: none;
  }   /* Mouse over link */
  a:active {
    color:#008543;
    text-decoration: none;
  }  /* Selected link   */

  


  body {
    background-image: url("assets/webassets/river.png");
    background-size: cover;
    background-position: fixed;
    
  }
</style>
